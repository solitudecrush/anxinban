spring.application.name=anxinban

spring.datasource.url=jdbc:mysql://localhost:3306/anxinban?useSSL=false&serverTimezone=UTC&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

mqtt.enabled=true
mqtt.broker-host=localhost
mqtt.broker-port=1883
mqtt.client-id=backend-anxinban
mqtt.connection-timeout=30
mqtt.keep-alive-interval=60
mqtt.clean-session=true
mqtt.automatic-reconnect=true
mqtt.qos=1
mqtt.ssl-enabled=false
mqtt.subscribe-topics=

mqtt.simulator.enabled=false
mqtt.simulator.house-id=demo-house
mqtt.simulator.room=living-room
mqtt.simulator.interval-seconds=30

# ============ AI 外部服务配置 ============
# 队长的 Python AI 服务地址，为空则不调用外部 AI 服务，全部走 Java fallback
# 示例: http://127.0.0.1:8000 或 http://120.27.129.78:8000
ai.service.base-url=${AI_SERVICE_BASE_URL:}
# 调用外部 AI 服务的超时时间（秒）
ai.service.timeout-seconds=15
# 是否启用外部 AI 转发，设为 false 可强制走 Java fallback
ai.service.enable-forward=true
