spring.application.name=anxinban

spring.datasource.url=jdbc:mysql://localhost:3306/anxinban?useSSL=false&serverTimezone=UTC&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

mqtt.enabled=true
mqtt.broker-host=localhost
mqtt.broker-port=1883
mqtt.client-id=backend-anxinban
mqtt.connection-timeout=30
mqtt.keep-alive-interval=60
mqtt.clean-session=true
mqtt.automatic-reconnect=true
mqtt.qos=1
mqtt.ssl-enabled=false
mqtt.subscribe-topics=

mqtt.simulator.enabled=false
mqtt.simulator.house-id=demo-house
mqtt.simulator.room=living-room
mqtt.simulator.interval-seconds=30
